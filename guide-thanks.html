<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Self-Love Guide is on the way</title>
<meta http-equiv="refresh" content="2; url=/self-love-guide.pdf" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 0; background: #F8F1E0; font-family: 'Lora', Georgia, serif; color: #2B2724; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 24px; text-align: center; }
  .rose { width: 80px; margin: 0 auto 20px; display: block; }

  .divider { width: 50px; height: 1px; background: #BE9A57; margin: 14px auto 0; }
  h1 { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 40px; color: #9E1C2A; font-weight: 600; line-height: 1.15; margin: 28px 0 0; }
  p { font-family: 'Lora', serif; font-size: 16px; line-height: 1.8; color: #2B2724; padding-top: 18px; }
  .btn { display: inline-block; margin-top: 28px; padding: 16px 32px; background: #9E1C2A; color: #FFFFFF; font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; border-radius: 4px; font-weight: 700; }
  .btn:hover { background: #7C1622; }
  .home { margin-top: 22px; font-family: 'Lora', serif; font-size: 14px; }
  .home a { color: #7C1622; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <img class="rose" src="/rose.png" alt="Arlana Flowers rose mark" onerror="this.style.display='none'" />
  <div class="tag">Your guide is on the way</div>
  <div class="divider"></div>
  <h1>Thank you, Beautiful Flower.</h1>
  <p>Your Self-Love Starter Guide is downloading now. If it does not start automatically, tap the button below. Watch your inbox for a soft hello and the first bloom.</p>
  <a href="/self-love-guide.pdf" class="btn" download>Download the guide</a>
  <div class="home"><a href="/">Back to the garden</a></div>
</div>
</body>
</html>
